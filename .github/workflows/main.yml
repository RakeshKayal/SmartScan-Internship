name: Deploy to EC2

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Upload files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.MY_HOST }}
          username: ubuntu
          key: ${{ secrets.MY_KEY }}

          source: "app,bootstrap,config,database,public,resources,routes,artisan,composer.json,composer.lock"

          target: "/opt/lampp/htdocs"

          debug: true